<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survivor — Dungeon of Eternity</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        font-family: "Cinzel", serif;
      }

      canvas {
        display: block;
        box-shadow: inset 0 0 280px rgba(0, 0, 0, 0.75);
      }

      #auth-screen,
      #pause-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(120, 30, 30, 0.35), transparent 35%),
          linear-gradient(135deg, #050509, #11111f 50%, #050509);
      }

      #pause-screen {
        display: none;
        background: rgba(0, 0, 0, 0.78);
      }

      .auth-card,
      .pause-card {
        width: 390px;
        padding: 34px;
        border-radius: 22px;
        background: rgba(10, 10, 18, 0.96);
        border: 1px solid rgba(255, 215, 120, 0.25);
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.75);
        color: #fff;
        text-align: center;
      }

      .auth-card h1,
      .pause-card h2 {
        font-family: "Cinzel Decorative", serif;
        font-size: 34px;
        margin-bottom: 8px;
        color: #f5c76b;
        text-shadow: 0 0 18px rgba(245, 199, 107, 0.25);
      }

      .auth-card .subtitle,
      .pause-card .subtitle {
        margin-bottom: 24px;
        color: #b8b8c8;
        font-size: 14px;
        line-height: 1.5;
      }

      .auth-card input {
        width: 100%;
        padding: 13px 14px;
        margin-bottom: 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        outline: none;
        background: #151522;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .auth-card input::placeholder {
        color: #8e8ea0;
      }

      .auth-card button,
      .pause-card button {
        width: 100%;
        padding: 13px;
        margin-top: 8px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-family: "Cinzel", serif;
        font-weight: 900;
        color: #130d05;
        background: linear-gradient(135deg, #f5c76b, #b87524);
        transition: transform 0.15s ease, filter 0.15s ease;
      }

      .auth-card button:hover,
      .pause-card button:hover {
        transform: translateY(-1px);
        filter: brightness(1.08);
      }

      .auth-card button:disabled,
      .pause-card button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        transform: none;
      }

      .secondary-button {
        background: transparent !important;
        color: #f5c76b !important;
        border: 1px solid rgba(245, 199, 107, 0.45) !important;
      }

      .danger-button {
        background: linear-gradient(135deg, #ef4444, #7f1d1d) !important;
        color: #fff !important;
      }

      .register-button {
        background: linear-gradient(135deg, #6ee7b7, #16a34a) !important;
        color: #03140c !important;
      }

      .auth-message {
        min-height: 20px;
        margin-top: 14px;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }

      .auth-error {
        color: #f87171;
      }

      .auth-success {
        color: #4ade80;
      }

      .screen-title {
        font-size: 20px;
        margin-bottom: 18px;
        color: #ffffff;
      }

      #pause-score {
        margin: 18px 0;
        padding: 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        color: #e5e7eb;
        font-family: Arial, sans-serif;
        line-height: 1.7;
      }

      #pause-score strong {
        color: #f5c76b;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-B88RfuAD.js"></script>
  </head>

  <body>
    <div id="auth-screen">
      <div class="auth-card">
        <h1>Hero Survivor</h1>

        <div id="login-form">
          <p class="subtitle">Entre na sua conta para jogar e salvar sua pontuação.</p>

          <input id="login-email-input" type="email" placeholder="E-mail" />
          <input id="login-password-input" type="password" placeholder="Senha" />

          <button id="login-button">Entrar</button>
          <button id="go-to-register-button" class="secondary-button">
            Criar conta
          </button>

          <p id="login-message" class="auth-message"></p>
        </div>

        <div id="register-form" style="display: none;">
          <p class="screen-title">Criar conta</p>
          <p class="subtitle">Cadastre-se para entrar no jogo e participar do ranking global.</p>

          <input id="register-username-input" type="text" placeholder="Nome de usuário" />
          <input id="register-email-input" type="email" placeholder="E-mail" />
          <input id="register-password-input" type="password" placeholder="Senha" />

          <button id="register-button" class="register-button">Cadastrar e jogar</button>
          <button id="back-to-login-button" class="secondary-button">
            Voltar para login
          </button>

          <p id="register-message" class="auth-message"></p>
        </div>
      </div>
    </div>

    <div id="pause-screen">
      <div class="pause-card">
        <h2>Jogo Pausado</h2>
        <p class="subtitle">Escolha uma opção para continuar.</p>

        <p id="pause-score">
          Pontuação atual: <strong>0</strong>
        </p>

        <button id="resume-button">Retornar ao jogo</button>

        <button id="pause-save-button" class="secondary-button">
          💾 Salvar e sair
        </button>

        <button id="pause-music-button" class="secondary-button">
        Música: ON
        </button>

        <button id="pause-logout-button" class="danger-button">
          Sair da conta
        </button>
      </div>
    </div>

  </body>
</html>
